pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

apply from: 'capacitor.settings.gradle'
include ':outline-lib'
project(':outline-lib').projectDir = new File(settingsDir, '../../src/cordova/android/OutlineAndroidLib/outline')
